const { useState, useEffect, useRef, useCallback, createElement: h } = React;

const MAP_W = 820, MAP_H = 500;
const AGENT_TYPES = {
  drone: { icon: "◈", color: "#FF6B00", speed: 3.5, capacity: 2, range: 180, label: "DRONE" },
  robot: { icon: "◉", color: "#FFFFFF", speed: 1.2, capacity: 5, range: 90, label: "ROBOT AMR" },
  bike: { icon: "◆", color: "#FF9D45", speed: 2.5, capacity: 8, range: 250, label: "E-BIKE" },
};
const VENDORS = ["RoyalFleet", "SwiftBot", "AeroLink", "UrbanFleet", "NexDrone"];
const ZONES = [
  { name: "CAMDEN", x: 100, y: 80, w: 200, h: 150 },
  { name: "CANARY WHARF", x: 380, y: 60, w: 220, h: 160 },
  { name: "GREENWICH", x: 500, y: 280, w: 200, h: 180 },
  { name: "SHOREDITCH", x: 80, y: 300, w: 220, h: 170 },
];
const uid = () => Math.random().toString(36).slice(2, 8);
const dist = (a, b) => Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const rand = (lo, hi) => lo + Math.random() * (hi - lo);
const O = "#FF6B00";
const MONO = "'Space Mono', 'Courier New', monospace";

class SwarmEngine {
  constructor() {
    this.agents = []; this.orders = []; this.auctions = []; this.handoffs = [];
    this.connections = []; this.eventLog = []; this.tick = 0;
    this.stats = { delivered: 0, auctionsRun: 0, handoffsCompleted: 0, heals: 0, alerts: 0 };
    this.paused = false; this.safetyZone = null;
  }
  init(count = 15) {
    this.agents = [];
    for (let i = 0; i < count; i++) {
      const typeKey = pick(Object.keys(AGENT_TYPES));
      const t = AGENT_TYPES[typeKey];
      this.agents.push({ id: uid(), type: typeKey, vendor: pick(VENDORS), x: rand(40, MAP_W - 40), y: rand(40, MAP_H - 40), targetX: null, targetY: null, battery: rand(60, 100), capacity: t.capacity, load: 0, speed: t.speed * rand(0.85, 1.15), range: t.range, status: "idle", orderId: null, discoveredPeers: [], safetyMode: false });
    }
    this.log("SYSTEM", "Swarm initialized: " + count + " agents across " + VENDORS.length + " vendors");
    return this;
  }
  log(source, message, type) { type = type || "info"; this.eventLog.unshift({ tick: this.tick, source: source, message: message, type: type, ts: Date.now() }); if (this.eventLog.length > 120) this.eventLog.length = 120; }
  runDiscovery() {
    this.connections = [];
    for (const a of this.agents) { if (a.status === "offline") continue; a.discoveredPeers = [];
      for (const b of this.agents) { if (a.id === b.id || b.status === "offline") continue;
        if (dist(a, b) < a.range) { a.discoveredPeers.push(b.id); this.connections.push({ from: a.id, to: b.id, strength: 1 - dist(a, b) / a.range }); }
      }
    }
  }
  maybeSpawnOrder() {
    if (this.orders.filter(function(o){return o.status==="pending"}).length >= 5) return;
    if (Math.random() > 0.025) return;
    var order = { id: uid(), pickupX: rand(60, MAP_W - 60), pickupY: rand(60, MAP_H - 60), deliverX: rand(60, MAP_W - 60), deliverY: rand(60, MAP_H - 60), weight: rand(0.5, 6), status: "pending", assignedAgent: null, handoffAgent: null, createdAt: this.tick };
    this.orders.push(order);
    this.log("ORDER", "New order " + order.id.slice(0, 4) + " — " + order.weight.toFixed(1) + "kg", "order");
  }
  runAuctions() {
    var pending = this.orders.filter(function(o){return o.status==="pending"});
    for (var oi = 0; oi < pending.length; oi++) {
      var order = pending[oi];
      var candidates = this.agents.filter(function(a){ return a.status === "idle" && !a.safetyMode && a.capacity >= order.weight && a.battery > 20 && dist(a, { x: order.pickupX, y: order.pickupY }) < a.range * 1.5; });

      order.status = "auctioning";
      var bids = candidates.map(function(a){ var d = dist(a, { x: order.pickupX, y: order.pickupY }); var score = (1 - d / (a.range * 1.5)) * 0.4 + (a.battery / 100) * 0.3 + (1 - a.load / a.capacity) * 0.3; return { agent: a, score: score, dist: d }; });
      bids.sort(function(a, b){ return b.score - a.score; });
      var winner = bids[0];
      this.auctions.unshift({ id: uid(), orderId: order.id, tick: this.tick, winnerId: winner.agent.id, bids: bids.map(function(b){ return { agentId: b.agent.id, score: b.score.toFixed(3), vendor: b.agent.vendor }; }) });

    }
  }
  moveAgents() {
    for (var i = 0; i < this.agents.length; i++) {
      var a = this.agents[i];
      if (a.status === "offline" || a.safetyMode) continue;
      a.battery = Math.max(0, a.battery - 0.008);
      if (a.battery <= 0) { this.triggerAgentFailure(a, "battery_dead"); continue; }
      if (a.targetX != null && a.targetY != null) {
        var d = dist(a, { x: a.targetX, y: a.targetY });
        if (d < a.speed * 1.5) { a.x = a.targetX; a.y = a.targetY; this.onArrival(a); }

    }
  }
  onArrival(a) {

  initiateHandoff(fromAgent, order) {

      fromAgent.status = "idle"; fromAgent.orderId = null; fromAgent.load = 0; fromAgent.targetX = null; fromAgent.targetY = null;
      self.log("HANDOFF", fromAgent.vendor + "/" + fromAgent.type + " → " + relay.vendor + "/" + relay.type + " for " + order.id.slice(0, 4), "handoff");
    }, 800);
  }
  triggerAgentFailure(agent, reason) {
    reason = reason || "random";
    if (agent.status === "offline") return;
    var hadOrder = agent.orderId; agent.status = "offline";
    var order = this.orders.find(function(o){return o.id===hadOrder});
    this.log("FAULT", "⚠ " + agent.vendor + "/" + agent.type + " offline (" + reason + ")", "error");
    if (order && order.status !== "delivered") { order.status = "pending"; order.assignedAgent = null; this.stats.heals++; this.log("HEAL", "Re-auctioning order " + order.id.slice(0, 4), "heal"); }
    agent.orderId = null; agent.load = 0; agent.targetX = null; agent.targetY = null;
    var self = this;
    setTimeout(function(){ agent.status = "idle"; agent.battery = rand(40, 70); self.log("HEAL", agent.vendor + "/" + agent.type + " recovered (" + agent.battery.toFixed(0) + "%)", "heal"); }, rand(3000, 6000));
  }
  maybeFailAgent() {
    if (Math.random() > 0.004) return;
    var alive = this.agents.filter(function(a){return a.status!=="offline"});
    if (alive.length < 5) return;
    this.triggerAgentFailure(pick(alive), pick(["network_loss", "hardware_fault", "battery_critical"]));
  }
  triggerSafetyAlert(x, y, radius) {
    radius = radius || 120; this.safetyZone = { x: x, y: y, radius: radius, startTick: this.tick }; this.stats.alerts++;
    var frozen = 0; var self = this;
    for (var i = 0; i < this.agents.length; i++) { var a = this.agents[i]; if (a.status === "offline") continue; if (dist(a, { x: x, y: y }) < radius) { a.safetyMode = true; a.targetX = null; a.targetY = null; frozen++; } }
    this.log("SAFETY", "Safety mesh propagated — " + frozen + " agents frozen", "safety");

  }
  maybeSafetyEvent() { if (Math.random() > 0.001 || this.safetyZone) return; this.triggerSafetyAlert(rand(100, MAP_W - 100), rand(100, MAP_H - 100), rand(80, 150)); }
  update() {
    if (this.paused) return; this.tick++;
    this.runDiscovery(); this.maybeSpawnOrder(); this.runAuctions(); this.moveAgents(); this.maybeFailAgent(); this.maybeSafetyEvent();

  }
}
